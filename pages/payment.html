<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">TourRide</div>
</nav>

<section class="booking-section">

    <h2>Select Payment Method</h2>

    <form class="booking-form">

        <label>
            <input type="radio" name="payment">
            UPI
        </label>

        <label>
            <input type="radio" name="payment">
            Credit Card
        </label>

        <label>
            <input type="radio" name="payment">
            Debit Card
        </label>

        <label>
            <input type="radio" name="payment">
            Net Banking
        </label>

        <a href="confirmation.html">
            <button type="button">
                Confirm Payment
            </button>
        </a>

    </form>

</section>

</body>
</html>
