<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scooty Rentals</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">TourRide</div>
</nav>

<section class="vehicle-section">

    <h2>Available Scooties</h2>

    <div class="vehicle-container">

        <div class="vehicle-card">

            <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=600" alt="Activa">

            <h3>Honda Activa</h3>

            <p class="price">₹500 / Day</p>

            <p class="available">🟢 Available</p>

            <a href="booking.html">
    <button class="book-btn">
        Book Now
    </button>
</a>

        </div>

        <div class="vehicle-card">

            <img src="https://images.unsplash.com/photo-1609630875171-b1321377ee65?w=600" alt="Jupiter">

            <h3>TVS Jupiter</h3>

            <p class="price">₹450 / Day</p>

            <p class="booked">🔴 Booked</p>

            <button class="disabled-btn">
                Not Available
            </button>

        </div>

        <div class="vehicle-card">

            <img src="https://images.unsplash.com/photo-1611241443702-4e2dbef7e5c0?w=600" alt="Access">

            <h3>Suzuki Access</h3>

            <p class="price">₹550 / Day</p>

            <p class="available">🟢 Available</p>

            <button class="book-btn">
                Book Now
            </button>

        </div>

    </div>

</section>

</body>
</html>
